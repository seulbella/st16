<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>다중 배경 이미지</title>
  <style>

    *{margin: 0; padding: 0;}
    .box{
      width: 100%; height: 100vh;
      background-image: 
        url(../css/images/sun.png),
        url(../css/images/field2.png),
        url(../css/images/flower.png);
        
      
      background-repeat: 
        no-repeat,
        repeat-x,
        repeat-x;

      
      background-position: 
        90% 50px,
        50% 100%,
        50% 100%;

      background-size: 
        auto,
        10%,
        10%;
    }
  </style>
</head>
<body>
  <div class="box">

  </div>
</body>
</html>
