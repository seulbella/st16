<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>border-radius2</title>
  <style>
    *{
      margin: 0;
      padding: 0;
    }
    body{
      margin: 50px;
    }
    .box{
      width: 300px;
      height: 400px;
      border: 1px solid #000;
      border-radius: 50px;
      overflow: hidden;
    }

    .child{
      /* background-color: #ff93bd; */
      /* rgba는 투명도까지 조절할 수 있음 */
      background-color: rgba(255, 120, 199, 0.5);
      /* 퍼센트 단위는 부모를 기준으로 함 */
      height: 100%;
    }

    /* 
    자식의 크기가 부모크기보다 넘쳐날 때
    overflow
    */
  </style>
</head>
<body>
  <div class="box">
    <div class="child">
      Lorem ipsum dolor sit amet consectetur, adipisicing elit. At, earum. Enim mollitia dolores maxime maiores quis. Atque at consectetur nostrum!
    </div>
  </div>
</body>
</html>
