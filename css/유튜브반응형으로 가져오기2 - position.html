<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유튜브 반응형으로 가져오기 - position</title>
  <style>
    *{margin: 0; padding: 0;}
    body{margin: 50px;}
    .media-box{
      max-width: 600px;
    }
    .media-box .iframe-wrap{
      position: relative;
      /* 
      동영상 16:9 비율이면, 9/16 = 0.5625 => 56.25%
      동영상 4:3 비율이면, 4/3 = 0.75.. => 75%
      */
      padding-top: 56.25%;
      background-color: #f00;
    }
    .media-box .iframe-wrap iframe{
      position: absolute;
      left: 0; top: 0;
      /* 기준요소의 크기 기준 */
      width: 100%; height: 100%;
    }
  </style>
</head>
<body>
  <div class="media-box">
    <div class="iframe-wrap">
      <iframe src="https://www.youtube.com/embed/Kz2BsKX04ek?si=1VGeXk_g40l6APzt" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>      
    </div>
  </div>
</body>
</html>
