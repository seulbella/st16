<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가상클래스 hover</title>
  <style>
    *{margin: 0; padding: 0;}

    body{
      margin: 30px;
    }

    /* 한칸 공백은 후손 / > 직계 자식 */
    .product, .product>div{
      box-sizing: border-box;
    }

    .product{
      width: 300px;
      padding: 30px;
      /* background-color: #ccc; */
      margin-bottom: 30px;
    }

    /* 자식의 수평크기는 부모의 콘텐츠 영역의 크기 width : auto; */
    /* 자식의 수직크기는 자식의 콘텐츠 영역의 크기 height : 자식마다 지정 */
    .product .thumb{
      background-color: #f68;
      min-height: 200px;
      margin-bottom: 30px;
    }

    .product .desc{
      background-color: coral;
    }

    /* 가상클래스는 웹에서 자주 발생하는 상태를 선택자
    :hover 마우스를 어떤 요소 위에 올려둔 상태 * /
    /* 
    마우스를 상품설명이나 상품이미지에 위치시키면 상품 이미지에
    그림자가 표시
    - 마우스를 요소에 위치시키면 :hover
      ㄴ 요소 -> 상품이미지(.thumb), 상품설명(.desc)
      ㄴ 요소 -> .thumb, .desc 의 부모인 ==> .product
    - 동작
      ㄴ 상품이미지에 그림자 표시
        ㄴ 상품이미지 .thumb
        ㄴ 그림자 표시 box-shadow
    */

    .product:hover .thumb{
      box-shadow: 0px 7px 22.5px rgba(102,102,102,0.7);
    }

  </style>
</head>
<body>
  <ul>
    <li class="product">
      <div class="thumb">이미지</div>
      <div class="desc">상품설명</div>
    </li>
    <li class="product">
      <div class="thumb">이미지</div>
      <div class="desc">상품설명</div>
    </li>
  </ul>
</body>
</html>
