<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유튜브 반응형으로 가져오기 - 박스모델의 이해</title>
  <style>
    *{margin: 0; padding: 0;}
    body{margin: 50px;}
    /* 부모의 너비를 따르지만 768px 이상은 넘지 말아라. */
    .media-box{
      max-width: 768px;
      background-color: #bbb;}
    .iframe-wrap{
      background-color: #00ffff;
      width: 500px; height: 500px;
      /* 해당 요소의 콘텐츠 영역은 수직 크기는 0 */
      padding-top: 500px;
      box-sizing: border-box;
      /* overflow: hidden; */
      /* .iframe-wrap .box의 기준요소가 되기 위해 */
      position: relative;
    }
    .iframe-wrap .box{
      opacity: 0.5;
      background-color: #f00;
      /* 부모의 콘텐츠 영역을 다 사용 */
      /* width: 100%; height: 100%; */
      /* 기준 : 가까운 조상 중 position static을 제외한 설정값이 있는 요소 */
      position: absolute;
      left: 0; top: 0;
      /* 기준요소의 콘텐츠 영역을 사용 */
      width: 100%; height: 100%;
    }
  </style>
</head>
<body>
  <div class="media-box">
    <div class="iframe-wrap">
      <div class="box">Lorem ipsum dolor, sit amet consectetur adipisicing elit. Inventore laudantium quis non ipsa rem facilis. Hic soluta cum nemo. Eaque ratione molestiae rem ad ut, autem perferendis et impedit. Consequuntur.</div>
    </div>
  </div>
</body>
</html>
