<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{margin: 0; padding: 0;}
    .img-wrap{
      width: 200px; height: 200px;
      background-color: #fcc;
      margin-bottom: 50px;
      border-radius: 50%;
      overflow: hidden;
    }
    .img-wrap img{
      /* opacity: 0.5; */
      width: 100%; height: 100%;
      object-fit: cover;
    }
    
    .img-wrap:nth-child(2) img{
      object-position: center top;
    }
    
  </style>
</head>
<body>
  <div class="img-wrap">
    <img src="../images/img1.png" alt="">
  </div>
  <div class="img-wrap">
    <img src="../images/test-img.png" alt="">
  </div>
</body>
</html>
