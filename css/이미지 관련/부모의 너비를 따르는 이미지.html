<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부모의 너비를 따르는 이미지</title>
  <style>
    *{margin: 0; padding: 0;}
    .wrap{margin: 30px;}
    .img-wrap{
      /* width: auto; 기본값 */
      background-color: #f68;
    }

    /* 1. 부모의 너비랑 상관없는 이미지는 항상 부모의 너비를 따라서 자동 조절 */
    .img-wrap img{
      width: 100%;
      /* height: auto; 이미지의 가로세로 비율을 유지 */
      display: block;
      opacity: 0.5; /* 테스트 삭제 */
    }

    /* 2. 부모의 너비를 따르지만 자신의 크기 이상 커지지 않고, 화질 또한 망치지 말아야 할 때 */
    .max-img{
      width: 80%;
      background-color: #6f8;
    }

    .max-img img{
      opacity: 0.5;
      width: auto; /* 반드시 auto로 되어 있어야 하며, 기본값이기 때문에 작성 안해도 무방하다.*/
      max-width: 100%;
    }

    /* 3. 이미지가 부모의 높이를 따라야 할 때 */
    .img-wrap2{
      background-color: #86f;
      height: 400px;
    }

    .img-wrap2 img{
      opacity: 0.5;
      /* width: auto; */
      height: 100%;
    }

  </style>
</head>
<body>
  <div class="wrap">
    <div class="img-wrap">
      <img src="../images/smartbanner-01-01-pc.png" alt="가을 원피스 할인 이벤트">
    </div>
    <div class="max-img">
      <img src="../images/test-img.png" alt="">
    </div>
    <div class="img-wrap2">
      <img src="../images/test-img.png" alt="">
    </div>
  </div>
  <!-- //.wrap -->
</body>
</html>
