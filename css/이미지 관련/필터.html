<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>필터</title>
  <style>
    .wrap{}
    .visual-section{
      /* 100vw는 스크롤바를 합친크기를 사용하기 때문에 잘 사용하지 않는다. */
      /* viewport의 크기를 다 사용할 때 쓰는 방법 = width : 100% */
      width: 100%;
      height: 100vh;
      background-color: #97948d;
      /* inline-block을 가운데 정렬 */
      text-align: right;
      align-content: center;
      /* .visual-section 자식요소를 위해 */
      position: relative;
    }
    .img-wrap{
      height: 100%;
      display: inline-block;
    }
    .img-wrap img{
      height: 100%;
      display: block;
      filter: blur(4px) grayscale(100%);
      /* filter 세부 속성 태그는 w3school filter 참고 */
    }

  </style>
</head>
<body>
  <div class="visual-section">
    <div class="img-wrap">
      <img src="../images/background-test.jpg" alt="">
    </div>
    <div class="text-wrap"></div>
  </div>
</body>
</html>
