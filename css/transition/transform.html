<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>transform</title>
  <!-- transform
  - transform 속성을 지정해주면, 해당 요소는 z-index화로
  레이어로 관리해줄 수 있음. 
  -->
  <style>
    *{margin: 0; padding: 0; box-sizing: border-box;}
    body{
      margin: 50px;
    }
    .exam-wrap{
      background-color: #3cc;
      border: 1px solid #000;
      padding: 30px;
    }
    .img-wrap{
      background-color: beige;
      border: 1px solid #f00;
      width: 300px;
      overflow: hidden;
    }
  
    img{
      /* opacity: 0.5; */
      /* 부모의 너비보다 이미지가 크기 때문에 부모에 맞춰주기 */
      width: 100%;
      height: auto; /* 기본값 */
      display: block;
    }

    img:hover{
      /* transform */
      transform: scale(2);
      transform-origin: center top;
    }
    
  </style>

</head>
<body>
  <div class="exam-wrap">
    <div class="img-wrap">
      <img src="../images/test-img.png" alt=""></div>
  </div>
</body>
</html>
