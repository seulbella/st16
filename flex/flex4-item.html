<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex3-flex container</title>
  <link rel="stylesheet" href="../reset.css">
    <!-- 
    1. flex 선언 container
    2. flex의 방향을 결정 container
    3. 아이템의 축소/확장을 결정 item
    4. 아이템의 크기 결정 item
    5. 아이템의 줄바꿈을 결정 container
    6. 여백관리 gap container margin item
    7. 정렬 container / item, margin
  -->
  <style>
   .wrap{
    margin: 50px;
   }
   .container{
    background-color: #fcc;
   }

   .item{
    border: 1px solid #999;

   }

   .flex{
    display: flex;
   }

   .flex .item{
    flex-grow: 1;
    flex-shrink: 0;
   }

   .flex .item:nth-child(1){
    flex-grow: 2;
   }
   .flex .item:nth-child(2){
    flex-grow: 8;
   }
   .flex .item:nth-child(3){
    flex-grow: 1;
   }
   .flex .item:nth-child(4){
    flex-grow: 1;
   }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="container flex">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>    
    </div>
  </div>
</body>
</html>
