<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex 실습7 상품목록</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    /* 모양 */
    .ec-base-product{background-color: #ccc;}
    .ec-base-product .prdList{background-color: #fcc;}
    .ec-base-product .prdList > li{
      opacity: 0.5;
      box-sizing: border-box;
      border: 1px solid #000;
      background-color: #cff;
      padding: 1rem;
    }

    /* flex */
    .ec-base-product{}

    /* flex container */
    .ec-base-product .prdList{
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    /* flex item */
    /* pc에서는 4단, tablet은 3단, mo은 2단 */
    .ec-base-product .prdList > li{
      /* item 줄바꿈 할 경우 */
      flex-shrink: 0;
      /* flex-basis : auto; */
      /* width: 25%; 여백이 없을 때 (현재는 gap을 지정해줬으니 여백 넓이 계산법으로 적용하자 아래 참고) */
      width: calc(25% - (20px * (4 - 1) / 4));
      aspect-ratio: 1.5;
    }

    /* table은 3단 */
    @media (max-width:1023.98px){
      .ec-base-product .prdList > li{
        width: calc(33.33% - (20px * (3 - 1) / 3));
      }
    }

    /* mo은 2단 */
    @media (max-width:767.98px){
      .ec-base-product .prdList > li{
        width: calc(50% - (20px * (2 - 1) / 2));
      }
    }
  </style>
</head>
<body>
  <div class="ec-base-product">
    <ul class="prdList">
      <li>아이템1</li>
      <li>아이템2</li>
      <li>아이템3</li>
      <li>아이템4</li>
      <li>아이템5</li>
      <li>아이템6</li>
      <li>아이템7</li>
      <li>아이템8</li>
    </ul>
  </div>
</body>
</html>
