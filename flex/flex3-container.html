<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex3-flex container</title>
  <link rel="stylesheet" href="../reset.css">
  <!-- flex container 속성 실습을 위해서
   아이템의 확장x, 축소x -->
  <!-- 
    1. flex 선언 container
    2. flex의 방향을 결정 container
    3. 아이템의 축소/확장을 결정 item
    4. 아이템의 크기 결정 item
    5. 아이템의 줄바꿈을 결정 container
    6. 여백관리 gap container margin item
    7. 정렬 container / item, margin

    **flex box 내 자식들은 부모를 기준으로 height를 내려 받을 수 있다.** 
  -->
  <style>

   .wrap{
    margin: 50px;
   }
   .container{
    background-color: #fcc;
  }
  
  
  .flex{
     width: 300px;
     height: 300px;
     /* 1. flex 컨테이너 선언 - 단이 될 요소의 부모 */
     display: flex;
     /* 2. flex의 방향을 결정 - 주축,교차축 결정 */
     flex-direction: row;
     /* 5. flex-wrap : flex container 안에서 flex item의 합이 flex container보다 더 클 경우 줄바꿈 */
     /* 전제조건 -> 아이템확장? 아이템축소 x */
     flex-wrap: wrap;
     /* 6. 여백관리 gap container margin item */
     /* gap, justify-content, align-content를 같이 지정하면 원하는 레이아웃을 못 얻을 수도 있다. */
     column-gap: 1rem;
     row-gap: 10px;
      /* 7. 정렬 container / item, margin */
      /* 7-1 주축의 정렬 */
      justify-content: start; /* center, end, space-around, space-evenly, space-between 등 (나머지 값들) */

      /* 7-2 교차축의 정렬 */
      /* 7-2-1 여러줄의 정렬 align-content */
      /* 7-2-2 한줄 정렬 align-items */
      /* 기본값 : 플렉스의 컨테이너의 교차축 크기에 맞춰서 늘어나라 () */
      /* align-content: stretch */
      align-content: space-evenly;
    }
    
    .flex .item{
      /* 3. 아이템의 확장/축소를 결정 */
      flex-grow: 0;
      flex-shrink: 0;
      /* 4. 아이템의 크기 결정 */
      width: 80px;
    }
    
    .item{
     border: 1px solid #999;
    }

    </style>
</head>
<body>
  <div class="wrap">
    <div class="container flex">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
    </div>
  </div>
</body>
</html>
