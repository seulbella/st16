<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grid 영역 grid-area</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
/* 
    1. grid container : grid 선언
      > display : grid
    2. grid container : 행(줄)과 열(칸)의 갯수, 크기 정하기
      > grid-template-row : 1줄(크기px), 2줄, ..
      > grid-template-column : 1칸, 2칸, 3칸, ..
    2-1. repeat로 반복 선언
      > grid-template-rows: repeat(3(줄), 100px(크기))
    2-1-2. 크기 단위를 fr(등분)로 선언
      > grid-template-rows: repeat(3, 1fr);
      | 3줄 위주로 1fr 이면 3등분
    2-2. 명시적 그리드 선언 (위 코드 참조)
    2-3. 암시적 그리드 선언 : 나의 그리드 시스템에 선언되지 않은 요소의 암묵적인 크기를 선언하는 것 (생략가능)
      > grid-auto-rows: 1줄(크기px)
      > grid-auto-column: 1칸(크기px)
    2-4. span : 합친다는 뜻으로, 그리드 크기 선언 시 아래와 같이 간단하게 표기할 수 있다.
      > grid-column: 1/span 2;
      > grid-column: 1/2; (위와 동일한 표기법)
    3. grid item : item의 배치를 설정
      > grid-row : 1/3 (예시)
      > grid-column : 2/4 (예시)
    4. 여백
    5. 정렬
    */

    .wrap{
      /* 1 */
      display: grid;
      /* 2 행열 갯수, 크기
      3줄 헤더, 콘텐츠, 푸터
      2칸 첫번째 컬럼 250px, 2차 여유공간은 모두
      */
      grid-template-rows: 150px minmax(500px, auto) 300px;
      grid-template-columns: 250px 1fr;
      /* 7 그리드 영역이름 활용 (생략가능) */
      grid-template-areas: 
        "hd hd"
        "lnb mc"
        /* '.(점)'은 해당 공간은 비워놓는다는 뜻 */
        ". footer"
      ;
    }

    header{
      background-color: #ccc;
      /* 영역명은 변수처럼 사용되니 따옴표를 붙이면 텍스트가 됩니다. */
      grid-area: hd;
    }

    aside{
      background-color: #fcc;
      grid-area: lnb;
    }

    .main-content{
      background-color: #ccf;
      grid-area: mc;
    }

    footer{
      background-color: #cfc;
      grid-area: footer;
    } 

  </style>
</head>
<body>
  <div class="wrap">
    <header>헤더</header>
    <aside>LNB</aside>
    <main class="main-content">페이지내용</main>
    <footer>푸터</footer>
  </div>
</body>
</html>
