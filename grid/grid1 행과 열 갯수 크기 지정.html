<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grid fraction, repeat, minmax</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    /* 
    1. grid container : grid 선언
      > display : grid
    2. grid container : 행(줄)과 열(칸)의 갯수, 크기 정하기
      > grid-template-row : 1줄(크기px), 2줄, ..
      > grid-template-column : 1칸, 2칸, 3칸, ..
    2-1. repeat로 반복 선언
      > grid-template-rows: repeat(3(줄), 100px(크기))
    2-1-2. 크기 단위를 fr(등분)로 선언
      > grid-template-rows: repeat(3, 1fr);
      | 3줄 위주로 1fr 이면 3등분
    2-2. 명시적 그리드 선언 (위 코드 참조)
    2-3. 암시적 그리드 선언 : 나의 그리드 시스템에 선언되지 않은 요소의 암묵적인 크기를 선언하는 것 (생략가능)
      > grid-auto-rows: 1줄(크기px)
      > grid-auto-column: 1칸(크기px)
    3. grid item : item의 배치를 설정
      > grid-row : 1/3 (예시)
      > grid-column : 2/4 (예시)
    4. 여백
    5. 정렬
    */

    /* 모양 */
    .wrap{
      margin: 50px;
    }

    .grid-container{
      background-color: magenta;
    }
    .grid-container .item{
      opacity: 0.5;
      box-sizing: border-box;
      background-color: dodgerblue;
      border: 2px solid #fff;
    }

    /* grid */
    .grid-container{
      display: grid;
      /* 2줄 4칸 */
      grid-template-rows: 100px 200px;
      grid-template-rows: 100px 100px;
      grid-template-rows: repeat(2, 100px);
      grid-template-columns: repeat(4, 100px);

      /* 상,하 동일 (1) */
      /* grid-template-columns: 100px 200px 100px 200px;
      grid-template-columns: repeat(2, 100px 200px); */

      /* 상,하 동일 (2) */
      /* grid-template-columns: 20px 50px 50px 50px 50px 50px 50px 20px;
      grid-template-columns: 20px repeat(6, 50px) 20px; */

      /* fr 부모의 남은 공간을 나눌 단위 */
      /* 12컬럼 그리드 시스템 -> 1fr */
      /* 12컬럼 그리드에서 3컬럼을 사용해서 4단으로 만들게요. */
      grid-template-columns: repeat(4, 3fr);
      grid-template-columns: 1fr 4fr 1fr;
      grid-template-columns: 100px 1fr 150px;
      grid-template-columns: 20% 50% 30%;
      /* minmax : 500px 보단 작아지지 말고, 50% 보다 커지지 말아라. */
      grid-template-columns: 20% minmax(500px, 50%) 30%;
    }

    /* grid item */
    .grid-container .item{
    }
    .grid-container .item:nth-child(1){

    }
    .grid-container .item:nth-child(2){

    }
    .grid-container .item:nth-child(3){

    }
    .grid-container .item:nth-child(4){

    }
    .grid-container .item:nth-child(5){

    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid-container">
      <div class="item">아이템1</div>
      <div class="item">아이템2</div>
      <div class="item">아이템3</div>
      <div class="item">아이템4</div>
      <div class="item">아이템5</div>
      <div class="item">아이템6</div>
      <div class="item">아이템7</div>
      <div class="item">아이템8</div>
    </div>
  </div>
</body>
</html>
