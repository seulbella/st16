<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grid5 정렬과 배치</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    /* 
    1. grid container : grid 선언
      > display : grid
    2. grid container : 행(줄)과 열(칸)의 갯수, 크기 정하기
      > grid-template-row : 1줄(크기px), 2줄, ..
      > grid-template-column : 1칸, 2칸, 3칸, ..
    2-1. repeat로 반복 선언
      > grid-template-rows: repeat(3(줄), 100px(크기))
    2-1-2. 크기 단위를 fr(등분)로 선언
      > grid-template-rows: repeat(3, 1fr);
      | 3줄 위주로 1fr 이면 3등분
    2-2. 명시적 그리드 선언 (위 코드 참조)
    2-3. 암시적 그리드 선언 : 나의 그리드 시스템에 선언되지 않은 요소의 암묵적인 크기를 선언하는 것 (생략가능)
      > grid-auto-rows: 1줄(크기px)
      > grid-auto-column: 1칸(크기px)
    2-4. span : 합친다는 뜻으로, 그리드 크기 선언 시 아래와 같이 간단하게 표기할 수 있다.
      > grid-column: 1/span 2;
      > grid-column: 1/2; (위와 동일한 표기법)
    3. grid item : item의 배치를 설정
      > grid-row : 1/3 (예시)
      > grid-column : 2/4 (예시)
    4. 여백
    5. 정렬
    */

    /* 모양 */
    .wrap{
      margin: 50px;
    }

    .grid-container{
      background-color: #ccc;
      min-height: 500px;
    }
    .grid-container .item{
      background-color: dodgerblue;
      box-sizing: border-box;
      border: 1px solid magenta;
    }

    /* grid */
    .grid-container{
      display: grid;
      /* 정렬을 위해 item의 합이 container보다 작게 지정 */
      /* grid-template-rows: repeat(3, 100px); */
      grid-template-columns: repeat(3, 30%);
      /* 컨테이너 안에서 아이템의 정렬과 배치 */
      /* 수평정렬 start center end */
      justify-content: start;
      /* 수평배치 양끝정렬 s-b s-a s-e */
      justify-content: space-evenly;
      /* 정렬/배치 기본값 */
      justify-content: normal;
      /* block축의 크기를 지정하지 않으면 stretch 처리됨 */
      align-content: normal;
      /* block축의 크기를 지정하면 start */
      grid-template-rows: repeat(3, 100px);
      align-content: end;

      /* 여백 gap(container), margin(item) 
      justify-, align- 값이 between-* 으로 되어 있으면 gap 설정 무시
      */

      /* -items 그리드 영역 안에서 정렬 */
      justify-items: center;
      align-items: center;
    }

    /* grid item */
    .grid-container .item{
      
    }
    .grid-container .item:nth-child(1){
      justify-self: start;
      align-self: start;
    }
    .grid-container .item:nth-child(2){

    }
    .grid-container .item:nth-child(3){

    }
    .grid-container .item:nth-child(4){

    }
    .grid-container .item:nth-child(5){

    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid-container">
      <div class="item">아이템1</div>
      <div class="item">아이템2</div>
      <div class="item">아이템3</div>
      <div class="item">아이템4</div>
      <div class="item">아이템5</div>
      <div class="item">아이템6</div>
      <div class="item">아이템7</div>
      <div class="item">아이템8</div>
    </div>
  </div>
</body>
</html>
